<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katamari Web</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app"></div>
    <div id="ui-layer">

        <div id="start-screen" class="overlay">
            <div class="menu-card">
                <h1>Katamari</h1>
                <p class="subtitle">Roll everything. Grow endlessly.</p>

                <div class="controls-grid">
                    <div class="control-item">
                        <div class="key-group">
                            <div class="key">W</div><div class="key">A</div><div class="key">S</div><div class="key">D</div>
                        </div>
                    </div>
                    <div class="control-desc">Move around</div>

                    <div class="control-item">
                        <div class="key">Mouse Drag</div>
                    </div>
                    <div class="control-desc">Rotate camera</div>

                    <div class="control-item">
                        <div class="key">ESC</div>
                    </div>
                    <div class="control-desc">Pause game</div>
                </div>

                <button id="start-btn">Start Rolling</button>
            </div>
        </div>

        <div id="pause-screen" class="overlay hidden">
            <div class="menu-card">
                <h1>Paused</h1>
                <p class="subtitle">Take a breather.</p>
                <button id="resume-btn" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {'key': 'Escape', 'code': 'Escape'}))">Resume Game</button>
            </div>
        </div>

        <div id="hud">
            <div class="hud-label">Current Size</div>
            <div>
                <span id="size-val" class="hud-value">1.00</span>
                <span class="hud-unit">m</span>
            </div>
        </div>

        <div id="crosshair"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
